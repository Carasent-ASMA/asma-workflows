name: Reusable Build and Publish

on:
    workflow_call:
        inputs:
            publish_npm:
                description: "Whether to publish to npm registry"
                required: false
                type: boolean
                default: true
            package_name:
                description: "Package name for logging"
                required: true
                type: string
            ai_release_notes_enabled:
                description: "Enable AI-generated release notes (falls back automatically if unavailable)"
                required: false
                type: boolean
                default: true
            ai_release_notes_model:
                description: "Model name for AI release notes (gh copilot --model value; empty uses account default)"
                required: false
                type: string
                default: "gpt-5-mini"
        secrets:
            GH_TOKEN:
                required: false
            COPILOT_TOKEN:
                required: false
            ASMA_POINTER_SYNC_APP_ID:
                required: false
            ASMA_POINTER_SYNC_APP_PRIVATE_KEY:
                required: false

jobs:
    release_plan:
        name: Resolve Release Plan
        runs-on: ubuntu-latest
        permissions:
            contents: read
        outputs:
            code_changed: ${{ steps.release_gate.outputs.code_changed }}
            should_publish: ${{ steps.release_gate.outputs.should_publish }}
            should_continue: ${{ steps.release_gate.outputs.should_continue }}
            bump_type: ${{ steps.release_gate.outputs.bump_type }}
            version: ${{ steps.resolve_release.outputs.version }}
            tag: ${{ steps.resolve_release.outputs.tag }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  token: ${{ github.token }}

            - name: Checkout shared workflow scripts
              uses: actions/checkout@v6
              with:
                  repository: Carasent-ASMA/asma-workflows
                  ref: master
                  path: .github/_asma-workflows
                  sparse-checkout: |
                      .github/actions/update-submodule-pointer
                      .github/scripts/release_gate.py
                      .github/scripts/git_tagging_ops.py
                      .github/scripts/git_tagging_plan.py
                      .github/scripts/git_tagging_shared.py
                      .github/scripts/update_submodule_pointer.py
                      .github/scripts/npm_publish

            - name: Validate package name
              run: python .github/_asma-workflows/.github/scripts/npm_publish/package_json_npm_release.py validate-package-name
              env:
                  PACKAGE_NAME: ${{ inputs.package_name }}

            - name: Run release gate
              id: release_gate
              run: >-
                  python .github/_asma-workflows/.github/scripts/release_gate.py release-gate
                  --patterns ^src/ ^package\.json$ ^pnpm-lock\.yaml$ ^tsconfig\.json$ ^\.npmignore$ 
                  --strategy all_commits_since_last_stable_tag

            - name: Fetch latest tags
              if: steps.release_gate.outputs.should_continue == 'true'
              run: python .github/_asma-workflows/.github/scripts/git_tagging_ops.py fetch-tags --remote-name origin

            - name: Resolve next stable release
              if: steps.release_gate.outputs.should_continue == 'true'
              id: resolve_release
              run: 'python .github/_asma-workflows/.github/scripts/git_tagging_plan.py resolve-next-stable-release --bump-type "${{ steps.release_gate.outputs.bump_type != ''none'' && steps.release_gate.outputs.bump_type || ''patch'' }}" --fallback-version 0.0.0'

    build:
        name: Build Package
        needs: release_plan
        if: ${{ needs.release_plan.outputs.should_continue == 'true' }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  token: ${{ github.token }}

            - name: Checkout shared workflow scripts
              uses: actions/checkout@v6
              with:
                  repository: Carasent-ASMA/asma-workflows
                  ref: master
                  path: .github/_asma-workflows
                  sparse-checkout: |
                      .github/scripts/npm_publish

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  registry-url: "https://registry.npmjs.org"

            - name: Install pnpm
              uses: pnpm/action-setup@v5
              with:
                  version: 9

            - name: Remove legacy npm config
              run: python .github/_asma-workflows/.github/scripts/npm_publish/package_json_npm_release.py remove-legacy-npm-config

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build package
              run: pnpm build

    publish_release:
        name: Publish Release
        needs:
            - release_plan
            - build
        if: >-
            always() &&
            needs.release_plan.outputs.should_continue == 'true' &&
            needs.build.result == 'success'
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  token: ${{ github.token }}

            - name: Checkout shared workflow scripts
              uses: actions/checkout@v6
              with:
                  repository: Carasent-ASMA/asma-workflows
                  ref: master
                  path: .github/_asma-workflows
                  sparse-checkout: |
                      .github/scripts/git_tagging_ops.py
                      .github/scripts/git_tagging_plan.py
                      .github/scripts/git_tagging_shared.py
                      .github/scripts/npm_publish

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  registry-url: "https://registry.npmjs.org"

            - name: Install pnpm
              uses: pnpm/action-setup@v5
              with:
                  version: 9

            - name: Remove legacy npm config
              run: python .github/_asma-workflows/.github/scripts/npm_publish/package_json_npm_release.py remove-legacy-npm-config

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Apply version to package.json
              id: apply_version
              run: python .github/_asma-workflows/.github/scripts/npm_publish/package_json_npm_release.py apply-version
              env:
                  VERSION: ${{ needs.release_plan.outputs.version }}

            - name: Build package
              run: pnpm build

            - name: Configure git
              run: 'python .github/_asma-workflows/.github/scripts/git_tagging_ops.py configure-remote-auth --remote-name origin --remote-url "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" --user-name "github-actions[bot]" --user-email "github-actions[bot]@users.noreply.github.com"'
              env:
                  GITHUB_TOKEN: ${{ github.token }}
                  GITHUB_REPOSITORY: ${{ github.repository }}

            - name: Create release tag
              run: 'python .github/_asma-workflows/.github/scripts/git_tagging_ops.py create-annotated-tag --tag "${{ needs.release_plan.outputs.tag }}" --message "chore: release ${{ needs.release_plan.outputs.version }} [skip ci]"'

            - name: Push release tag
              run: 'python .github/_asma-workflows/.github/scripts/git_tagging_ops.py push-tag --tag "${{ needs.release_plan.outputs.tag }}" --remote-name origin'

            - name: Install AI release-notes dependencies
              if: inputs.ai_release_notes_enabled == true
              run: pip install tree-sitter tree-sitter-typescript tree-sitter-javascript tree-sitter-python tree-sitter-c-sharp tree-sitter-sql tree-sitter-yaml 2>/dev/null || true

            - name: Create GitHub Release
              continue-on-error: true
              run: python .github/_asma-workflows/.github/scripts/npm_publish/release_notes.py
              env:
                  GITHUB_TOKEN: ${{ github.token }}
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}
                  VERSION: ${{ needs.release_plan.outputs.version }}
                  BUMP_TYPE: ${{ needs.release_plan.outputs.bump_type }}
                  PACKAGE_NAME: ${{ inputs.package_name }}
                  AI_RELEASE_NOTES_ENABLED: ${{ inputs.ai_release_notes_enabled }}
                  AI_RELEASE_NOTES_MODEL: ${{ inputs.ai_release_notes_model }}
                  COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}

            - name: Publish to npm
              if: inputs.publish_npm == true
              run: npm publish --provenance --access public

    update_submodule_pointer:
        name: Update asma-modules Pointer
        needs:
            - release_plan
            - build
            - publish_release
        if: >-
            always() &&
            github.ref == 'refs/heads/master' &&
            contains(fromJSON('["success","skipped"]'), needs.release_plan.result) &&
            contains(fromJSON('["success","skipped"]'), needs.build.result) &&
            contains(fromJSON('["success","skipped"]'), needs.publish_release.result)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout caller repository
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.sha }}
                  fetch-depth: 0

            - name: Checkout shared pointer action
              uses: actions/checkout@v6
              with:
                  repository: Carasent-ASMA/asma-workflows
                  ref: master
                  path: .github/_asma-workflows-action
                  sparse-checkout: |
                      .github/actions/update-submodule-pointer
                      .github/scripts/update_submodule_pointer.py
                      .github/scripts/github_pr_shared.py

            - name: Update asma-modules pointer
              uses: ./.github/_asma-workflows-action/.github/actions/update-submodule-pointer
              with:
                  github-app-id: ${{ secrets.ASMA_POINTER_SYNC_APP_ID }}
                  github-app-private-key: ${{ secrets.ASMA_POINTER_SYNC_APP_PRIVATE_KEY }}
                  caller-repository: ${{ github.repository }}
                  caller-sha: ${{ github.sha }}
                  caller-ref-name: ${{ github.ref_name }}

    build_summary:
        name: Build Summary
        needs:
            - release_plan
            - build
            - publish_release
            - update_submodule_pointer
        if: always()
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout shared workflow scripts
              uses: actions/checkout@v6
              with:
                  repository: Carasent-ASMA/asma-workflows
                  ref: master
                  path: .github/_asma-workflows
                  sparse-checkout: |
                      .github/scripts/npm_publish

            - name: Build summary
              run: python .github/_asma-workflows/.github/scripts/npm_publish/package_json_npm_release.py build-summary
              env:
                  PACKAGE_NAME: ${{ inputs.package_name }}
                  CODE_CHANGED: ${{ needs.release_plan.outputs.code_changed }}
                  SHOULD_PUBLISH: ${{ needs.release_plan.outputs.should_publish }}
                  BUMP_TYPE: ${{ needs.release_plan.outputs.bump_type }}
                  VERSION: ${{ needs.release_plan.outputs.version }}
                  PUBLISH_NPM: ${{ inputs.publish_npm }}
