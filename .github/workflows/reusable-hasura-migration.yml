name: Reusable Hasura Migration

on:
    workflow_call:
        inputs:
            environment:
                description: "Target environment"
                required: true
                type: string
            service_name:
                description: "Hasura service name"
                required: false
                type: string
            create_tag:
                description: "Whether to create env tag in service repo"
                required: false
                type: boolean
                default: true
        secrets:
            KUBE_CONFIG_PROD:
                required: true
            KUBE_CONFIG_NONPROD:
                required: true
            HASURA_ADMIN_SECRET:
                required: true

jobs:
    migrate:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Checkout shared workflow scripts
              uses: actions/checkout@v4
              with:
                  repository: Carasent-ASMA/asma-workflows
                  ref: master
                  path: .github/_asma-workflows
                  sparse-checkout: |
                      .github/scripts/deploy

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install Python dependencies
              run: pip install requests

            - name: Setup kubectl
              uses: azure/setup-kubectl@v4

            - name: Setup hasura cli
              run: |
                  curl -L https://github.com/hasura/graphql-engine/raw/v2.42.0/cli/get.sh | bash
                  sudo mv ./bin/hasura /usr/local/bin/hasura
                  hasura version

            - name: Configure git for HTTPS push
              run: |
                  git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "git@github.com:"
                  git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"

            - name: Run hasura migration
              run: |
                  python .github/_asma-workflows/.github/scripts/deploy/deploy.py hasura-migration \
                    --environment '${{ inputs.environment }}' \
                    --service-name '${{ inputs.service_name != '' && inputs.service_name || github.event.repository.name }}' \
                    ${{ inputs.create_tag && '--create-tag' || '--no-create-tag' }}
              env:
                  COMMIT_SHA: ${{ github.sha }}
                  SERVICE_NAME: ${{ inputs.service_name }}
                  WORKSPACE_DIR: ${{ github.workspace }}
                  GIT_SSH_ORIGIN: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}
                  KUBE_CONFIG_PROD: ${{ secrets.KUBE_CONFIG_PROD }}
                  KUBE_CONFIG_NONPROD: ${{ secrets.KUBE_CONFIG_NONPROD }}
                  HASURA_ADMIN_SECRET: ${{ secrets.HASURA_ADMIN_SECRET }}
