name: Scaffold Doctor

on:
  workflow_call:

jobs:
  scaffold-doctor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Ensure host prerequisites for scaffold checks
        run: |
          sudo apt-get update
          sudo apt-get install -y make git docker.io docker-compose-plugin
          corepack enable

      - name: Run scaffold install (real runner installation)
        env:
          ASMA_SCAFFOLD_SKIP_INTEGRATION_PREFLIGHT: '1'
          ASMA_SCAFFOLD_SKIP_GIT_BOOTSTRAP: '1'
        run: make scaffold

      - name: Run scaffold doctor (runner readiness)
        run: asma doctor scaffold

      - name: Run scaffold doctor with integrations (optional)
        if: ${{ secrets.JIRA_BASE_URL != '' && secrets.JIRA_EMAIL != '' && secrets.JIRA_API_TOKEN != '' && secrets.BB_USERNAME != '' && secrets.BB_API_TOKEN != '' && secrets.GH_TOKEN != '' }}
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          BB_USERNAME: ${{ secrets.BB_USERNAME }}
          BB_API_TOKEN: ${{ secrets.BB_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: asma doctor scaffold --with-integrations
