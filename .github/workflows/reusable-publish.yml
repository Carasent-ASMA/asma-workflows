name: Reusable Build and Publish

on:
    workflow_call:
        inputs:
            publish_npm:
                description: "Whether to publish to npm registry"
                required: false
                type: boolean
                default: true
            package_name:
                description: "Package name for logging"
                required: false
                type: string
                default: "package"

jobs:
    build-and-publish:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Check for code changes
              id: check_changes
              run: |
                  # Get the last tag or first commit
                  LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)

                  # Get changed files since last tag
                  CHANGED_FILES=$(git diff --name-only ${LAST_TAG}..HEAD)
                  echo "Changed files since ${LAST_TAG}:"
                  echo "$CHANGED_FILES"

                  # Check if any code-relevant files changed
                  CODE_CHANGED="false"

                  # Files/paths that should trigger build and publish
                  CODE_PATTERNS=(
                    "^src/"
                    "^package\.json$"
                    "^pnpm-lock\.yaml$"
                    "^tsconfig\.json$"
                    "^\.npmignore$"
                  )

                  # Check if any changed file matches code patterns
                  while IFS= read -r file; do
                    [ -z "$file" ] && continue
                    
                    for pattern in "${CODE_PATTERNS[@]}"; do
                      if echo "$file" | grep -qE "$pattern"; then
                        CODE_CHANGED="true"
                        echo "✓ Code change detected: $file"
                        break 2
                      fi
                    done
                  done <<< "$CHANGED_FILES"

                  echo "code_changed=${CODE_CHANGED}" >> $GITHUB_OUTPUT

                  if [ "$CODE_CHANGED" = "true" ]; then
                    echo "✅ Code changes detected - will build and potentially publish"
                  else
                    echo "⏭️  No code changes - skipping build/publish (only docs/config changed)"
                  fi

            - name: Setup Node.js
              if: steps.check_changes.outputs.code_changed == 'true'
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  registry-url: "https://registry.npmjs.org"

            - name: Install pnpm
              if: steps.check_changes.outputs.code_changed == 'true'
              uses: pnpm/action-setup@v3
              with:
                  version: 9

            - name: Install dependencies
              if: steps.check_changes.outputs.code_changed == 'true'
              run: pnpm install --frozen-lockfile

            - name: Build package
              if: steps.check_changes.outputs.code_changed == 'true'
              run: pnpm build

            - name: Analyze commits and determine version bump
              if: steps.check_changes.outputs.code_changed == 'true'
              id: check_publish
              run: |
                  # Get commits since last tag (or all if no tags)
                  LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
                  if [ -z "$LAST_TAG" ]; then
                    # No tags yet, get all commits
                    COMMITS=$(git log --format=%s origin/master)
                  else
                    # Get commits since last tag
                    COMMITS=$(git log ${LAST_TAG}..HEAD --format=%s)
                  fi

                  echo "Analyzing commits for version bump..."
                  echo "$COMMITS"

                  # Initialize bump type (none/patch/minor/major)
                  # Priority: major > minor > patch
                  BUMP_TYPE="none"
                  SHOULD_PUBLISH="false"

                  # Check each commit for conventional commit types
                  while IFS= read -r commit; do
                    # Skip empty lines
                    [ -z "$commit" ] && continue
                    
                    # Check for breaking change (!) - MAJOR
                    if echo "$commit" | grep -qE '^[a-z]+!(\([^)]*\))?:'; then
                      BUMP_TYPE="major"
                      SHOULD_PUBLISH="true"
                      echo "Found breaking change: $commit"
                      continue
                    fi
                    
                    # Check for feat - MINOR (only if not already major)
                    if [ "$BUMP_TYPE" != "major" ] && echo "$commit" | grep -qE '^feat(\([^)]*\))?:'; then
                      BUMP_TYPE="minor"
                      SHOULD_PUBLISH="true"
                      echo "Found feature: $commit"
                      continue
                    fi
                    
                    # Check for fix, perf - PATCH (only if not already minor or major)
                    if [ "$BUMP_TYPE" != "major" ] && [ "$BUMP_TYPE" != "minor" ] && \
                       echo "$commit" | grep -qE '^(fix|perf)(\([^)]*\))?:'; then
                      BUMP_TYPE="patch"
                      SHOULD_PUBLISH="true"
                      echo "Found fix/perf: $commit"
                    fi
                  done <<< "$COMMITS"

                  # Output results
                  echo "should_publish=${SHOULD_PUBLISH}" >> $GITHUB_OUTPUT
                  echo "bump_type=${BUMP_TYPE}" >> $GITHUB_OUTPUT

                  if [ "$SHOULD_PUBLISH" = "true" ]; then
                    echo "✅ Will publish with ${BUMP_TYPE} version bump"
                  else
                    echo "⏭️  No version bump needed (no feat/fix/perf/breaking commits)"
                  fi

            - name: Configure git
              if: steps.check_changes.outputs.code_changed == 'true' && steps.check_publish.outputs.should_publish == 'true'
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
                  git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

            - name: Bump version
              if: steps.check_changes.outputs.code_changed == 'true' && steps.check_publish.outputs.should_publish == 'true'
              id: bump_version
              run: |
                  npm version ${{ steps.check_publish.outputs.bump_type }} -m "chore: bump version to %s [skip ci]"
                  git push --follow-tags
                  NEW_VERSION=$(node -p "require('./package.json').version")
                  echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Create GitHub Release
              if: steps.check_changes.outputs.code_changed == 'true' && steps.check_publish.outputs.should_publish == 'true'
              run: |
                  gh release create "v${{ steps.bump_version.outputs.version }}" \
                    --title "Release v${{ steps.bump_version.outputs.version }}" \
                    --notes "Release v${{ steps.bump_version.outputs.version }} - ${{ steps.check_publish.outputs.bump_type }} version bump" \
                    --verify-tag
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Publish to npm
              if: steps.check_changes.outputs.code_changed == 'true' && steps.check_publish.outputs.should_publish == 'true' && inputs.publish_npm == true
              run: npm publish --provenance --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Build summary
              run: |
                  echo "### Build Summary - ${{ inputs.package_name }}" >> $GITHUB_STEP_SUMMARY

                  if [ "${{ steps.check_changes.outputs.code_changed }}" != "true" ]; then
                    echo "- ⏭️ No code changes detected (only docs/config changed)" >> $GITHUB_STEP_SUMMARY
                    echo "- ⏭️ Build and publish skipped" >> $GITHUB_STEP_SUMMARY
                  else
                    echo "- ✅ Code changes detected" >> $GITHUB_STEP_SUMMARY
                    echo "- ✅ Dependencies installed" >> $GITHUB_STEP_SUMMARY
                    echo "- ✅ Package built successfully" >> $GITHUB_STEP_SUMMARY
                    
                    if [ "${{ steps.check_publish.outputs.should_publish }}" == "true" ]; then
                      echo "- ✅ Version bumped to v${{ steps.bump_version.outputs.version }} (${{ steps.check_publish.outputs.bump_type }})" >> $GITHUB_STEP_SUMMARY
                      echo "- ✅ GitHub Release created" >> $GITHUB_STEP_SUMMARY
                      
                      if [ "${{ inputs.publish_npm }}" == "true" ]; then
                        echo "- ✅ Published to npm" >> $GITHUB_STEP_SUMMARY
                      else
                        echo "- ⏭️ npm publish skipped (publish_npm=false)" >> $GITHUB_STEP_SUMMARY
                      fi
                    else
                      echo "- ⏭️ Publish skipped (no feat/fix/perf/breaking commits found)" >> $GITHUB_STEP_SUMMARY
                    fi
                  fi
